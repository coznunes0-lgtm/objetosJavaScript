<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos JavaScript</title>
</head>
<body>
    <title>Objetos JavaScript</title>
    <script>
        const pessoa = {
            nome: "João",
            idade: 30,
            saudacao: function() {
                console.log("Olá, meu nome é " + this.nome);
            }
        };

     pessoa.saudacao(); //Chama o método saudacao do objeto pessoa
    </script>
</body>
</html>
